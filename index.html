<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowingIndia - आपकी मददगार वेबसाइट</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #fffdf7;
            color: #333;
            line-height: 1.8;
        }

        /* ===== PURANA SECTION ===== */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e3a8a;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* PHOTO STYLES */
        .photo-full {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin: 20px 0;
            display: block;
        }
        .photo-half-wrap {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .photo-half {
            width: 50%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
            display: block;
        }
        .photo-section {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 12px;
            margin: 28px 0;
            display: block;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 24px 0;
        }
        .photo-grid img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            display: block;
        }

        .highlight-old {
            background: #fef3c7;
            padding: 15px;
            border-left: 5px solid #f59e0b;
            border-radius: 8px;
            margin: 25px 0;
        }

        /* ===== FLASH BUTTON ===== */
        .button {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 30px auto;
            padding: 15px 25px;
            background: #22c55e;
            color: white;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(34,197,94,0.4);
            position: relative;
            overflow: hidden;
            animation: flashPulse 1.5s infinite;
        }
        .button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: flashSlide 1.5s infinite;
        }
        @keyframes flashPulse {
            0%, 100% { box-shadow: 0 5px 15px rgba(34,197,94,0.4); }
            50% { box-shadow: 0 5px 30px rgba(34,197,94,0.9), 0 0 20px rgba(34,197,94,0.6); }
        }
        @keyframes flashSlide {
            0% { left: -100%; }
            100% { left: 150%; }
        }
        .button:hover { background: #16a34a; }

        /* ===== NAYA CSS ===== */
        .divider {
            width: 60px;
            height: 4px;
            background: #e67e00;
            margin: 60px auto;
            border-radius: 2px;
        }
        .section {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        .section-label {
            font-size: 12px;
            letter-spacing: 2px;
            color: #e67e00;
            margin-bottom: 16px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .section h2 {
            font-size: clamp(24px, 5vw, 36px);
            color: #1a1a1a;
            margin-bottom: 24px;
            line-height: 1.4;
            font-family: Georgia, serif;
        }
        .section p {
            font-size: clamp(15px, 2.5vw, 18px);
            color: #444;
            margin-bottom: 20px;
        }
        .section p strong { color: #1a1a1a; }
        .highlight-new {
            border-left: 4px solid #e67e00;
            padding: 20px 24px;
            background: #fff3d0;
            margin: 32px 0;
            border-radius: 0 8px 8px 0;
        }
        .highlight-new p {
            font-size: clamp(17px, 3vw, 21px);
            color: #1a1a1a;
            font-style: italic;
            line-height: 1.7;
            margin: 0;
        }
        .warm-section {
            background: #fff8e7;
            padding: 60px 24px;
            border-top: 1px solid #ffe9a0;
            border-bottom: 1px solid #ffe9a0;
        }
        .warm-section .inner {
            max-width: 720px;
            margin: 0 auto;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0 0 0;
        }
        .skill-card {
            background: #fff;
            border: 2px solid #ffe9a0;
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(230,126,0,0.08);
            transition: transform 0.2s;
        }
        .skill-card:hover { transform: translateY(-4px); }
        .skill-icon { font-size: 36px; margin-bottom: 14px; }
        .skill-card h3 { font-size: 17px; color: #1a1a1a; margin-bottom: 8px; font-weight: 700; }
        .skill-card p { font-size: 14px; color: #777; margin: 0; }

        /* CTA BUTTON with flash */
        .cta-section {
            text-align: center;
            padding: 80px 24px;
            background: linear-gradient(160deg, #fff8e7 0%, #ffe9a0 100%);
        }
        .cta-section h2 {
            font-size: clamp(26px, 6vw, 44px);
            color: #1a1a1a;
            margin-bottom: 16px;
            line-height: 1.4;
            font-family: Georgia, serif;
        }
        .cta-section p { font-size: clamp(15px, 2.5vw, 18px); color: #555; margin-bottom: 40px; }

        .cta-btn {
            display: inline-block;
            background: #e67e00;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            padding: 18px 52px;
            border-radius: 50px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            animation: flashPulseOrange 1.5s infinite;
        }
        .cta-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: flashSlide 1.5s infinite;
        }
        @keyframes flashPulseOrange {
            0%, 100% { box-shadow: 0 8px 32px rgba(230,126,0,0.35); }
            50% { box-shadow: 0 8px 40px rgba(230,126,0,0.9), 0 0 24px rgba(230,126,0,0.6); }
        }

        footer {
            text-align: center;
            padding: 32px 24px;
            border-top: 1px solid #ffe9a0;
            font-size: 13px;
            color: #aaa;
            background: #fffdf7;
        }

        /* ===== FLASH BANNER ===== */
        .flash-banner {
            position: relative;
            width: 100%;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 20px 0;
        }
        .flash-banner::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background: conic-gradient(from var(--angle, 0deg), #e67e00, #ffb347, #fff3d0, #e67e00, #ff6600, #e67e00);
            animation: rotateBorder 2.5s linear infinite;
            z-index: 0;
        }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotateBorder { to { --angle: 360deg; } }
        .flash-banner-inner {
            position: relative;
            z-index: 1;
            background: #1a1a1a;
            border-radius: 14px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 44px 24px;
        }
        .fb-shimmer {
            position: absolute;
            top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(100deg, transparent 20%, rgba(255,179,71,0.08) 50%, transparent 80%);
            animation: fbSweep 2.2s ease-in-out infinite;
            z-index: 2; pointer-events: none; border-radius: 14px;
        }
        @keyframes fbSweep { 0% { left: -100%; } 100% { left: 150%; } }
        .fb-particles { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; border-radius: 14px; }
        .fb-dot {
            position: absolute; width: 3px; height: 3px;
            background: #e67e00; border-radius: 50%; opacity: 0;
            animation: fbFloat var(--dur) ease-in var(--delay) infinite;
        }
        @keyframes fbFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 0.6; } 80% { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
        }
        .fb-label { font-size: 11px; letter-spacing: 3px; color: #e67e00; font-weight: 700; text-transform: uppercase; margin-bottom: 14px; }
        .fb-title { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(32px, 8vw, 52px); font-weight: 900; color: #fff; line-height: 1.1; letter-spacing: -1px; }
        .fb-title span { color: #e67e00; display: inline-block; animation: fbFlash 1.8s ease-in-out infinite; }
        @keyframes fbFlash {
            0%, 100% { color: #e67e00; text-shadow: 0 0 20px rgba(230,126,0,0.4); }
            50% { color: #ffb347; text-shadow: 0 0 40px rgba(255,179,71,0.8), 0 0 80px rgba(230,126,0,0.4); }
        }
        .fb-tagline { font-family: 'Tiro Devanagari Hindi', Georgia, serif; font-size: clamp(14px, 3vw, 18px); color: #aaa; margin-top: 16px; line-height: 1.7; }
        .fb-tagline strong { color: #fff3d0; }
        .fb-badge {
            margin-top: 24px; display: inline-flex; align-items: center; gap: 8px;
            background: rgba(230,126,0,0.15); border: 1px solid rgba(230,126,0,0.4);
            border-radius: 50px; padding: 10px 20px;
            animation: fbPulse 2s ease-in-out infinite;
        }
        @keyframes fbPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(230,126,0,0); } 50% { box-shadow: 0 0 0 8px rgba(230,126,0,0.15); } }
        .fb-badge-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: fbBlink 1s ease-in-out infinite; }
        @keyframes fbBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; box-shadow: 0 0 0 4px rgba(34,197,94,0.3); } }
        .fb-badge span { font-size: 12px; color: #e67e00; font-weight: 700; }

        /* ===== PRICING SECTION ===== */
        .pricing-section {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 40px;
            text-align: center;
        }
        .pricing-section .section-label {
            font-size: 12px;
            letter-spacing: 2px;
            color: #e67e00;
            margin-bottom: 16px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .pricing-section h2 {
            font-size: clamp(22px, 5vw, 34px);
            color: #1a1a1a;
            margin-bottom: 8px;
            line-height: 1.4;
            font-family: Georgia, serif;
        }
        .pricing-card {
            border: 2px solid #e67e00;
            border-radius: 20px;
            padding: 36px 28px;
            margin: 32px 0;
            background: #fff;
            box-shadow: 0 8px 32px rgba(230,126,0,0.12);
            position: relative;
            overflow: hidden;
        }
        .pricing-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #e67e00, #ffb347, #e67e00);
        }
        .price-tag {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .price-now {
            font-size: clamp(42px, 10vw, 64px);
            font-weight: 900;
            color: #1a1a1a;
            font-family: Georgia, serif;
        }
        .price-old {
            font-size: clamp(22px, 5vw, 32px);
            color: #bbb;
            text-decoration: line-through;
            font-weight: 400;
        }
        .price-badge {
            background: #22c55e;
            color: white;
            font-size: 14px;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 50px;
            letter-spacing: 1px;
        }
        .pricing-perks {
            list-style: none;
            margin: 24px 0;
            text-align: left;
            display: inline-block;
        }
        .pricing-perks li {
            font-size: clamp(14px, 2.5vw, 16px);
            color: #444;
            margin-bottom: 12px;
            padding-left: 8px;
        }
        .pricing-perks li::before {
            content: '✓';
            color: #22c55e;
            font-weight: 800;
            margin-right: 10px;
        }
        .countdown-wrap {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 28px 0 8px;
        }
        .countdown-box {
            background: #1a1a1a;
            color: white;
            border-radius: 12px;
            padding: 16px 20px;
            min-width: 72px;
            text-align: center;
        }
        .countdown-num {
            font-size: clamp(28px, 7vw, 40px);
            font-weight: 900;
            font-family: Georgia, serif;
            line-height: 1;
            display: block;
        }
        .countdown-label {
            font-size: 11px;
            letter-spacing: 1px;
            color: #aaa;
            margin-top: 6px;
            display: block;
            text-transform: uppercase;
        }
        .countdown-note {
            font-size: 13px;
            color: #e67e00;
            margin-top: 8px;
            font-weight: 600;
        }
        .refund-strip {
            background: #f0fff4;
            border: 1px solid #86efac;
            border-radius: 12px;
            padding: 16px 20px;
            margin: 24px 0 0;
            font-size: clamp(13px, 2vw, 15px);
            color: #166534;
            font-weight: 600;
        }
        .social-proof {
            font-size: 13px;
            color: #888;
            margin-top: 20px;
        }
        .social-proof strong { color: #e67e00; }

        /* ===== FAQ SECTION ===== */
        .faq-section {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 24px 60px;
        }
        .faq-section .section-label {
            font-size: 12px;
            letter-spacing: 2px;
            color: #e67e00;
            margin-bottom: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .faq-section h2 {
            font-size: clamp(22px, 5vw, 32px);
            color: #1a1a1a;
            margin-bottom: 32px;
            font-family: Georgia, serif;
            line-height: 1.4;
        }
        .faq-item {
            border: 1.5px solid #ffe9a0;
            border-radius: 14px;
            margin-bottom: 14px;
            overflow: hidden;
            background: #fff;
        }
        .faq-q {
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            padding: 20px 24px;
            font-size: clamp(14px, 2.5vw, 16px);
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .faq-q .faq-icon {
            font-size: 20px;
            color: #e67e00;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .faq-item.open .faq-icon {
            transform: rotate(45deg);
        }
        .faq-a {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.3s ease;
            font-size: clamp(13px, 2vw, 15px);
            color: #555;
            line-height: 1.8;
            padding: 0 24px;
        }
        .faq-item.open .faq-a {
            max-height: 300px;
            padding: 0 24px 20px;
        }

        /* ===== DARK FOOTER ===== */
        .dark-footer {
            background: #111;
            color: #ccc;
            padding: 52px 24px 32px;
            text-align: center;
        }
        .dark-footer h3 {
            font-size: clamp(20px, 4vw, 26px);
            color: #fff;
            font-family: Georgia, serif;
            margin-bottom: 10px;
        }
        .dark-footer .df-tagline {
            font-size: clamp(13px, 2vw, 15px);
            color: #888;
            margin-bottom: 32px;
        }
        .dark-footer .df-badges {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
        }
        .df-badge {
            font-size: 13px;
            color: #bbb;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .df-badge span { font-size: 18px; }
        .dark-footer .df-support {
            border-top: 1px solid #2a2a2a;
            padding-top: 24px;
            margin-top: 8px;
        }
        .dark-footer .df-support p {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        .dark-footer .df-support a {
            color: #e67e00;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .dark-footer .df-copy {
            margin-top: 28px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>

    <!-- ===== PURANA CONTENT ===== -->
    <div class="container">
        <h1>GrowingIndia</h1>
        <p class="subtitle">Your Helping Website • आपकी मददगार वेबसाइट</p>

        <!-- FLASH BANNER -->
        <div class="flash-banner" id="flashBanner">
            <div class="flash-banner-inner">
                <div class="fb-shimmer"></div>
                <div class="fb-particles" id="fbParticles"></div>
                <p class="fb-label">🇮🇳 भारत की अपनी website</p>
                <h2 class="fb-title">Growing<span>India</span></h2>
                <p class="fb-tagline">
                    अपने शहर में सीखो, अपने शहर में कमाओ।<br>
                    <strong>हुनर तुम्हारा — पहचान तुम्हारी।</strong>
                </p>
                <div class="fb
