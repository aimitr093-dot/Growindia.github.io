<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - GrowingIndia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
        }
        .header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 1px;
        }
        .close-btn {
            font-size: 22px;
            color: #888;
            text-decoration: none;
            line-height: 1;
        }

        /* MAIN */
        .main {
            flex: 1;
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 24px;
        }

        .info-text {
            font-size: 14px;
            color: #555;
            margin-bottom: 24px;
        }

        /* FORM */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group input {
            width: 100%;
            padding: 16px 18px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
            background: white;
        }
        .form-group input:focus {
            border-color: #22c55e;
        }
        .form-group input::placeholder {
            color: #aaa;
        }

        /* PHONE INPUT */
        .phone-wrap {
            display: flex;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            background: white;
            transition: border-color 0.2s;
        }
        .phone-wrap:focus-within {
            border-color: #22c55e;
        }
        .phone-code {
            padding: 16px 14px;
            font-size: 15px;
            color: #333;
            border-right: 1.5px solid #ddd;
            background: #f9f9f9;
            white-space: nowrap;
        }
        .phone-wrap input {
            border: none !important;
            border-radius: 0 !important;
            flex: 1;
            padding: 16px 14px;
            font-size: 15px;
            outline: none;
        }
        .phone-wrap input:focus {
            border: none;
        }

        /* PRICE */
        .price-box {
            margin: 28px 0 8px 0;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .price-row .label {
            font-size: 15px;
            color: #555;
        }
        .price-row .value {
            font-size: 15px;
            color: #333;
        }
        .price-row .value .original {
            text-decoration: line-through;
            color: #aaa;
            margin-left: 6px;
            font-size: 14px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 14px;
            margin-top: 4px;
        }
        .total-row .label {
            font-size: 17px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .total-row .value {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a1a;
        }

        /* SPACER */
        .spacer { flex: 1; min-height: 40px; }

        /* PAYMENT BUTTON */
        .pay-btn-wrap {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            padding: 16px 24px 24px 24px;
            background: white;
            border-top: 1px solid #eee;
        }
        .pay-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 18px 24px;
            background: #22c55e;
            color: white;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .pay-btn:hover { background: #16a34a; }
        .pay-btn .arrow { font-size: 22px; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h2>CHECKOUT</h2>
        <a href="index.html" class="close-btn">✕</a>
    </div>

    <!-- MAIN FORM -->
    <div class="main">
        <p class="info-text">इस खरीद का एक्सेस इस ईमेल पर भेजा जाएगा</p>

        <!-- Email -->
        <div class="form-group">
            <input type="email" placeholder="Email Address" id="email">
        </div>

        <!-- Phone -->
        <div class="form-group">
            <div class="phone-wrap">
                <span class="phone-code">+91 ▾</span>
                <input type="tel" placeholder="Phone number *" id="phone">
            </div>
        </div>

        <!-- Price -->
        <div class="price-box">
            <div class="price-row">
                <span class="label">Sub Total</span>
                <span class="value">₹199 <span class="original">₹1,999</span></span>
            </div>
            <div class="total-row">
                <span class="label">Total</span>
                <span class="value">₹199</span>
            </div>
        </div>
    </div>

    <div class="spacer"></div>

    <!-- MAKE PAYMENT BUTTON -->
    <div class="pay-btn-wrap">
        <a href="payment.html" class="pay-btn">
            <span>Make Payment</span>
            <span class="arrow">→</span>
        </a>
    </div>

</body>
</html>
